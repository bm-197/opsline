services:
  postgres:
    image: postgres:18-alpine
    container_name: opsline-postgres
    environment:
      POSTGRES_USER: opsline
      POSTGRES_PASSWORD: opsline
      POSTGRES_DB: opsline
    ports:
      - "5432:5432"
    volumes:
      - opsline-pg:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsline -d opsline"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  opsline-pg:
